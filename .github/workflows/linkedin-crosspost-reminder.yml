name: LinkedIn Cross-Post Reminder

on:
  # Run daily at 9am UTC (4am PT, 5am MT, 6am CT, 7am ET)
  schedule:
    - cron: '0 9 * * *'
  # Allow manual trigger
  workflow_dispatch:
  # Run after deploy to check new posts
  workflow_run:
    workflows: ["Deploy Jekyll site to GitHub Pages"]
    types: [completed]

jobs:
  check-posts:
    runs-on: ubuntu-latest
    # Only run on master branch
    if: github.ref == 'refs/heads/master'
    outputs:
      has-new-posts: ${{ steps.find-posts.outputs.has_new_posts }}
      post-1-title: ${{ steps.find-posts.outputs.post_1_title }}
      post-1-slug: ${{ steps.find-posts.outputs.post_1_slug }}
      post-1-date: ${{ steps.find-posts.outputs.post_1_date }}
      post-1-url: ${{ steps.find-posts.outputs.post_1_url }}
      post-1-description: ${{ steps.find-posts.outputs.post_1_description }}
      post-1-categories: ${{ steps.find-posts.outputs.post_1_categories }}
      post-1-tags: ${{ steps.find-posts.outputs.post_1_tags }}
      post-1-filename: ${{ steps.find-posts.outputs.post_1_filename }}
      post-count: ${{ steps.find-posts.outputs.post_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find posts ready for LinkedIn sharing
        id: find-posts
        shell: bash
        run: |
          TODAY=$(date +%Y-%m-%d)
          SEVEN_DAYS_AGO=$(date -d "7 days ago" +%Y-%m-%d)

          echo "Today's date: $TODAY"
          echo "Looking for posts from before: $SEVEN_DAYS_AGO"

          POST_COUNT=0
          HAS_NEW="false"

          for file in _posts/*.md; do
            if [ -f "$file" ]; then
              FILENAME=$(basename "$file")
              POST_DATE=${FILENAME:0:10}

              if [[ ! "$POST_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
                continue
              fi

              if [[ "$POST_DATE" < "$SEVEN_DAYS_AGO" ]]; then
                TITLE=$(sed -n '/^---$/,/^---$/p' "$file" | grep "^title:" | sed 's/.*title: *["]*//' | sed 's/["]*$//')
                DESCRIPTION=$(sed -n '/^---$/,/^---$/p' "$file" | grep "^description:" | sed 's/.*description: *["]*//' | sed 's/["]*$//')
                LINKEDIN_SHARED=$(sed -n '/^---$/,/^---$/p' "$file" | grep "^linkedin_shared:" | awk '{print $2}' | tr -d ' ')
                CATEGORIES=$(sed -n '/^---$/,/^---$/p' "$file" | grep "^categories:" | sed 's/.*categories: *\[//' | sed 's/\]//' | tr -d ' ')
                TAGS=$(sed -n '/^---$/,/^---$/p' "$file" | grep "^tags:" | sed 's/.*tags: *\[//' | sed 's/\]//' | tr -d ' ')

                TITLE="${TITLE:-Untitled Post}"
                LINKEDIN_SHARED="${LINKEDIN_SHARED:-false}"

                if [ "$LINKEDIN_SHARED" = "true" ]; then
                  continue
                fi

                SLUG=${FILENAME:11:-3}
                POST_URL="https://uright.github.io/$SLUG"

                if [ "$POST_COUNT" = "0" ]; then
                  echo "post_1_title=$TITLE" >> $GITHUB_OUTPUT
                  echo "post_1_slug=$SLUG" >> $GITHUB_OUTPUT
                  echo "post_1_date=$POST_DATE" >> $GITHUB_OUTPUT
                  echo "post_1_url=$POST_URL" >> $GITHUB_OUTPUT
                  echo "post_1_description=$DESCRIPTION" >> $GITHUB_OUTPUT
                  echo "post_1_categories=$CATEGORIES" >> $GITHUB_OUTPUT
                  echo "post_1_tags=$TAGS" >> $GITHUB_OUTPUT
                  echo "post_1_filename=$FILENAME" >> $GITHUB_OUTPUT
                fi

                POST_COUNT=$((POST_COUNT + 1))
                HAS_NEW="true"
              fi
            fi
          done

          echo "post_count=$POST_COUNT" >> $GITHUB_OUTPUT
          echo "has_new_posts=$HAS_NEW" >> $GITHUB_OUTPUT
          echo "Found $POST_COUNT posts ready for sharing"

  create-issue:
    runs-on: ubuntu-latest
    needs: check-posts
    if: needs.check-posts.outputs.has-new-posts == 'true'
    steps:
      - name: Create LinkedIn crosspost reminder issue
        run: |
          # Create script file to avoid YAML escaping issues
          cat > /tmp/create-issue.js << 'SCRIPT_EOF'
          const post = {
            title: process.env.POST_TITLE,
            slug: process.env.POST_SLUG,
            date: process.env.POST_DATE,
            url: process.env.POST_URL,
            description: process.env.POST_DESCRIPTION,
            categories: process.env.POST_CATEGORIES,
            tags: process.env.POST_TAGS,
            filename: process.env.POST_FILENAME
          };

          const hashtags = post.tags
            ? post.tags.split(',').map(t => '#' + t.trim()).join(' ') + ' #tech #programming'
            : '#tech #programming';

          const issueBody = `
## LinkedIn Crosspost Reminder

This post is **7+ days old** and ready to cross-post to LinkedIn.

### Post Details
- **Title**: ${post.title}
- **Published**: ${post.date}
- **URL**: ${post.url}
- **Categories**: ${post.categories || 'N/A'}

---

### Option 1: LinkedIn Article (Full Content)

Click **"Write article"** on LinkedIn and paste the full blog content. Add at the bottom:

> Originally published on my blog: ${post.url}

**Pros**: Evergreen, SEO-friendly on LinkedIn, full content
**Cons**: Requires copy-pasting full article

---

### Option 2: LinkedIn Post (Summary - Recommended)

Copy the draft below:

---

**${post.title}**

${post.description || 'I wrote about this interesting topic - check it out!'}

${hashtags}

Full post: ${post.url}

---

### Front Matter Update

After posting to LinkedIn, update the front matter in \`_posts/${post.filename}\` to mark it as shared:

\`\`\`yaml
linkedin_shared: true
linkedin_url: "[YOUR LINKEDIN POST URL]"
\`\`\`

Then commit the change to disable future reminders for this post.

---

*This issue was automatically generated by the LinkedIn crosspost reminder workflow.*
          `;

          const { context } = require('@actions/github');
          const github = require('@actions/github');

          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: 'LinkedIn Crosspost: ' + post.title,
            body: issueBody,
            labels: ['linkedin-crosspost']
          }).then(() => {
            console.log('Created LinkedIn crosspost issue for:', post.title);
          }).catch(err => {
            console.error('Error creating issue:', err);
            process.exit(1);
          });
          SCRIPT_EOF

          # Run the script with environment variables
          node /tmp/create-issue.js
        env:
          GH_TOKEN: ${{ github.token }}
          POST_TITLE: ${{ needs.check-posts.outputs.post_1_title }}
          POST_SLUG: ${{ needs.check-posts.outputs.post_1_slug }}
          POST_DATE: ${{ needs.check-posts.outputs.post_1_date }}
          POST_URL: ${{ needs.check-posts.outputs.post_1_url }}
          POST_DESCRIPTION: ${{ needs.check-posts.outputs.post_1_description }}
          POST_CATEGORIES: ${{ needs.check-posts.outputs.post_1_categories }}
          POST_TAGS: ${{ needs.check-posts.outputs.post_1_tags }}
          POST_FILENAME: ${{ needs.check-posts.outputs.post_1_filename }}