name: LinkedIn Cross-Post Reminder

on:
  # Run daily at 9am UTC (4am PT, 5am MT, 6am CT, 7am ET)
  schedule:
    - cron: '0 9 * * *'
  # Allow manual trigger
  workflow_dispatch:
  # Run after deploy to check new posts
  workflow_run:
    workflows: ["Deploy Jekyll site to GitHub Pages"]
    types: [completed]

jobs:
  check-posts:
    runs-on: ubuntu-latest
    # Only run on master branch
    if: github.ref == 'refs/heads/master'
    outputs:
      new-posts: ${{ steps.find-posts.outputs.new_posts }}
      post-count: ${{ steps.find-posts.outputs.post_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find posts ready for LinkedIn sharing
        id: find-posts
        run: |
          # Get today's date
          TODAY=$(date +%Y-%m-%d)
          echo "Today's date: $TODAY"

          # Calculate date 7 days ago
          SEVEN_DAYS_AGO=$(date -d "7 days ago" +%Y-%m-%d)
          echo "Looking for posts from before: $SEVEN_DAYS_AGO"

          # Initialize output variables
          POSTS_JSON="[]"
          POST_COUNT=0

          # Loop through all markdown files in _posts
          for file in _posts/*.md; do
            if [ -f "$file" ]; then
              # Extract date from filename (YYYY-MM-DD-title.md)
              FILENAME=$(basename "$file")
              POST_DATE=${FILENAME:0:10}

              # Skip if date extraction failed
              if [[ ! "$POST_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
                continue
              fi

              # Check if post is 7+ days old
              if [[ "$POST_DATE" < "$SEVEN_DAYS_AGO" ]]; then
                echo "Found older post: $FILENAME ($POST_DATE)"

                # Extract front matter fields using grep/sed
                TITLE=$(sed -n '/^---$/,/^---$/p' "$file" | grep "^title:" | sed 's/.*title: *["]*//' | sed 's/["]*$//')
                DESCRIPTION=$(sed -n '/^---$/,/^---$/p' "$file" | grep "^description:" | sed 's/.*description: *["]*//' | sed 's/["]*$//')
                LINKEDIN_SHARED=$(sed -n '/^---$/,/^---$/p' "$file" | grep "^linkedin_shared:" | awk '{print $2}' | tr -d ' ')
                CATEGORIES=$(sed -n '/^---$/,/^---$/p' "$file" | grep "^categories:" | sed 's/.*categories: *\[//' | sed 's/\]//' | tr -d ' ')
                TAGS=$(sed -n '/^---$/,/^---$/p' "$file" | grep "^tags:" | sed 's/.*tags: *\[//' | sed 's/\]//' | tr -d ' ')

                # Set defaults if empty
                TITLE="${TITLE:-Untitled Post}"
                DESCRIPTION="${DESCRIPTION:-}"
                LINKEDIN_SHARED="${LINKEDIN_SHARED:-false}"

                echo "  Title: $TITLE"
                echo "  LinkedIn shared: $LINKEDIN_SHARED"

                # Skip if already shared
                if [ "$LINKEDIN_SHARED" = "true" ]; then
                  echo "  -> Skipping (already shared)"
                  continue
                fi

                # Generate slug from filename
                SLUG=${FILENAME:11:-3}

                # Build JSON object for this post
                POST_JSON=$(cat <<EOF
{
  "filename": "$FILENAME",
  "slug": "$SLUG",
  "date": "$POST_DATE",
  "title": "$TITLE",
  "description": "$DESCRIPTION",
  "categories": "$CATEGORIES",
  "tags": "$TAGS"
}
EOF
)

                # Add to array
                if [ "$POST_COUNT" = "0" ]; then
                  POSTS_JSON="[$POST_JSON]"
                else
                  POSTS_JSON="${POSTS_JSON%,}]"
                  POSTS_JSON="$POSTS_JSON,$POST_JSON]"
                fi
                POST_COUNT=$((POST_COUNT + 1))
              fi
            fi
          done

          echo "Found $POST_COUNT posts ready for sharing"
          echo "post_count=$POST_COUNT" >> $GITHUB_OUTPUT
          echo "new_posts=$POSTS_JSON" >> $GITHUB_OUTPUT

      - name: Display found posts
        if: steps.find-posts.outputs.post_count > 0
        run: |
          echo "## Posts Ready for LinkedIn Sharing"
          echo '${{ steps.find-posts.outputs.new_posts }}' | jq -r '.[] | "- \(.title) (published: \(.date))"'

  create-issues:
    runs-on: ubuntu-latest
    needs: check-posts
    if: needs.check-posts.outputs.post-count > 0
    steps:
      - name: Create GitHub Issues for LinkedIn sharing
        env:
          POSTS_JSON: ${{ needs.check-posts.outputs.new_posts }}
        run: |
          # Write posts to a temp file for jq processing
          echo '$POSTS_JSON' > /tmp/posts.json

          # Get total count
          TOTAL=$(jq length /tmp/posts.json)
          echo "Creating $TOTAL GitHub issue(s)..."

          # Loop through each post
          for i in $(seq 0 $((TOTAL - 1))); do
            POST=$(jq ".[$i]" /tmp/posts.json)

            TITLE=$(echo "$POST" | jq -r '.title')
            SLUG=$(echo "$POST" | jq -r '.slug')
            DATE=$(echo "$POST" | jq -r '.date')
            DESCRIPTION=$(echo "$POST" | jq -r '.description')
            CATEGORIES=$(echo "$POST" | jq -r '.categories')
            TAGS=$(echo "$POST" | jq -r '.tags')

            POST_URL="https://uright.github.io/$SLUG"

            # Generate a compelling LinkedIn post draft
            # Extract a short teaser from description or first lines
            TEASER="$DESCRIPTION"
            if [ -z "$TEASER" ] || [ "$TEASER" = "null" ]; then
              TEASER="I just wrote about this topic - check it out!"
            fi

            # Format categories/tags for LinkedIn
            HASHTAGS=$(echo "$TAGS" | sed 's/,/,#/g' | sed 's/^/#/')
            HASHTAGS="$HASHTAGS #tech #programming"

            ISSUE_BODY=$(cat <<EOF
## 📝 LinkedIn Post Ready

This post is **7+ days old** and ready to cross-post to LinkedIn.

### Post Details
- **Title**: $TITLE
- **Published**: $DATE
- **URL**: $POST_URL
- **Categories**: $CATEGORIES

---

### Option 1: LinkedIn Article (Full Content)

Click **"Write article"** on LinkedIn and paste the full blog content. Add at the bottom:

> Originally published on my blog: $POST_URL

**Pros**: Evergreen, SEO-friendly on LinkedIn, full content
**Cons**: Requires copy-pasting full article

---

### Option 2: LinkedIn Post (Summary - Recommended)

Copy the draft below:

---

**$TITLE**

$TEASER

$DESC_SNIPPET

#linkedin #tech #programming $HASHTAGS

🔗 Full post: $POST_URL

---

### Front Matter Update

After posting to LinkedIn, update the front matter in \`_posts/$SLUG.md\` to mark it as shared:

\`\`\`yaml
linkedin_shared: true
linkedin_url: "[YOUR LINKEDIN POST URL]"
\`\`\`

Then commit the change to disable future reminders for this post.

---

*🤖 This issue was automatically generated by the LinkedIn crosspost reminder workflow.*
EOF
)

            # Create the issue
            gh issue create \
              --title "📢 LinkedIn Crosspost: $TITLE" \
              --body "$ISSUE_BODY" \
              --label "linkedin-crosspost"

            echo "Created issue for: $TITLE"
          done

          echo "Done! Created $TOTAL issue(s)"
        env:
          GH_TOKEN: ${{ github.token }}